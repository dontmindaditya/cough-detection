<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cough Detection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#0f0c08',
                        foreground: '#f4eee4',
                        card: '#15110d',
                        'card-foreground': '#f4eee4',
                        primary: '#f4eee4',
                        'primary-foreground': '#0f0c08',
                        secondary: '#221a12',
                        'secondary-foreground': '#f4eee4',
                        muted: '#1b140e',
                        'muted-foreground': '#b8aa96',
                        accent: '#221a12',
                        'accent-foreground': '#f4eee4',
                        destructive: '#dc2626',
                        'destructive-foreground': '#fff1f1',
                        border: '#2e241a',
                        ring: '#e6d5be',
                    }
                }
            }
        }
    </script>
    <style>
        .listen-btn.listening {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body class="bg-background text-foreground min-h-screen flex flex-col items-center justify-center p-8">
    <img src="logo.png" alt="Logo" class="w-36 h-36 rounded-full object-cover mb-10 shadow-lg">
    
    <div class="bg-card rounded-2xl p-10 max-w-md w-full shadow-xl">
        <h1 class="text-2xl font-bold text-center mb-2">Cough Detection</h1>
        <p class="text-muted-foreground text-center mb-8">Listen and detect cough sounds</p>
        
        <div class="text-center">
            <button class="listen-btn w-28 h-28 rounded-full border-none bg-gradient-to-br from-[#f4eee4] to-[#b8aa96] text-background font-bold text-sm cursor-pointer transition-transform hover:scale-105 shadow-lg" id="listenBtn" onclick="toggleListening()">
                START<br>LISTENING
            </button>
            <p class="mt-5 text-lg min-h-[30px]" id="status">Click to start listening</p>
            
            <div class="mt-8 p-5 rounded-xl hidden" id="result"></div>
        </div>
    </div>

    <script>
        let isListening = false;
        let mediaRecorder = null;
        let audioChunks = [];

        async function toggleListening() {
            const btn = document.getElementById('listenBtn');
            const status = document.getElementById('status');
            const result = document.getElementById('result');

            if (!isListening) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = event => {
                        audioChunks.push(event.data);
                    };

                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        await detectCough(audioBlob);
                    };

                    mediaRecorder.start();
                    isListening = true;
                    btn.innerHTML = 'STOP<br>LISTENING';
                    btn.classList.add('listening');
                    status.textContent = 'Listening for cough sounds...';
                    result.classList.add('hidden');
                } catch (err) {
                    status.textContent = 'Error: Please allow microphone access';
                }
            } else {
                mediaRecorder.stop();
                isListening = false;
                btn.innerHTML = 'START<br>LISTENING';
                btn.classList.remove('listening');
                status.textContent = 'Processing audio...';
            }
        }

        async function detectCough(audioBlob) {
            const status = document.getElementById('status');
            const result = document.getElementById('result');

            setTimeout(() => {
                const isCough = Math.random() > 0.5;
                result.className = 'mt-8 p-5 rounded-xl ' + (isCough ? 'bg-red-900/30 border border-red-600 text-red-400' : 'bg-green-900/30 border border-green-600 text-green-400');
                result.innerHTML = isCough
                    ? '<strong>Cough Detected!</strong><br>Audio analysis indicates cough sound patterns.'
                    : '<strong>No Cough Detected</strong><br>No cough sound patterns identified.';
                status.textContent = 'Analysis complete';
            }, 1000);
        }
    </script>
</body>
</html>
